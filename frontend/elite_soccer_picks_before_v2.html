<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SharpEdge Soccer Picks</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #07111f;
      color: #e5eefc;
    }
    .wrap {
      max-width: 1200px;
      margin: auto;
      padding: 24px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 24px;
    }
    h1 {
      margin: 0;
      font-size: 30px;
      color: #ffffff;
    }
    .sub {
      color: #9fb3c8;
      margin-top: 6px;
    }
    .refresh {
      background: #00d4ff;
      color: #03111f;
      border: 0;
      border-radius: 10px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }
    .stat {
      background: #0d1b2f;
      border: 1px solid #1e3558;
      border-radius: 16px;
      padding: 16px;
    }
    .stat .num {
      font-size: 28px;
      font-weight: 800;
    }
    .stat .label {
      color: #9fb3c8;
      font-size: 13px;
    }
    .section {
      margin-top: 26px;
    }
    .section h2 {
      margin: 0 0 12px;
      font-size: 22px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
      gap: 16px;
    }
    .card {
      background: linear-gradient(180deg, #0e2037, #0a1728);
      border: 1px solid #1d365a;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    .teams {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .pick {
      font-size: 18px;
      color: #ffffff;
      margin-bottom: 12px;
    }
    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 12px;
    }
    .elite { background: #13f287; color: #022411; }
    .safe { background: #00d4ff; color: #03111f; }
    .watch { background: #ffd166; color: #2b1d00; }
    .reject { background: #ff5a6a; color: #2b0006; }
    .row {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #1b314f;
      padding: 8px 0;
      gap: 12px;
    }
    .row span:first-child {
      color: #9fb3c8;
    }
    .row span:last-child {
      font-weight: 700;
      text-align: right;
    }
    .notes {
      margin-top: 14px;
      font-size: 13px;
      color: #b9c8da;
      line-height: 1.45;
    }
    .gate {
      margin-top: 6px;
    }
    .empty {
      color: #9fb3c8;
      background: #0d1b2f;
      border: 1px dashed #2b4770;
      border-radius: 16px;
      padding: 18px;
    }
    .footer {
      margin-top: 28px;
      color: #7f94ad;
      font-size: 13px;
    }
    @media (max-width: 800px) {
      .header { flex-direction: column; align-items: flex-start; }
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <div>
        <h1>SharpEdge Soccer Picks</h1>
        <div class="sub">Today’s master picks powered by Safety V3, Elite Score, CLV, grading, and adaptive learning.</div>
      </div>
      <button class="refresh" onclick="loadPicks()">Refresh Picks</button>
    </div>

    <div class="grid">
      <div class="stat"><div class="num" id="eliteCount">0</div><div class="label">Elite</div></div>
      <div class="stat"><div class="num" id="safeCount">0</div><div class="label">Safe</div></div>
      <div class="stat"><div class="num" id="watchCount">0</div><div class="label">Watchlist</div></div>
      <div class="stat"><div class="num" id="rejectCount">0</div><div class="label">Rejected</div></div>
    </div>

    <div id="content"></div>

    <div class="footer">
      Auto-refreshes every 60 seconds. Source: <b>soccer_master_today_view</b>.
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://fcjwejraqnteginavhbp.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjandlanJhcW50ZWdpbmF2aGJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMzM5NzUsImV4cCI6MjA5NjgwOTk3NX0.5OlmWeWerssF-IzEWCijIYEO2ovgJMKUV6vt2n8P4KA";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function money(v) {
      if (v === null || v === undefined || v === "") return "-";
      return Number(v).toFixed(2);
    }

    function pct(v) {
      if (v === null || v === undefined || v === "") return "-";
      return Number(v).toFixed(1) + "%";
    }

    function statusLabel(status) {
      if (status === "PUBLISH_ELITE") return "ELITE";
      if (status === "PUBLISH_SAFE") return "SAFE";
      if (status === "WATCHLIST") return "WATCHLIST";
      return "REJECT";
    }

    function badgeClass(status) {
      if (status === "PUBLISH_ELITE") return "elite";
      if (status === "PUBLISH_SAFE") return "safe";
      if (status === "WATCHLIST") return "watch";
      return "reject";
    }

    function sectionTitle(status) {
      if (status === "PUBLISH_ELITE") return "⭐ Elite Picks";
      if (status === "PUBLISH_SAFE") return "✅ Safe Picks";
      if (status === "WATCHLIST") return "👀 Watchlist";
      return "❌ Rejected";
    }

    function renderCard(r) {
      const failed = Array.isArray(r.failed_gates) ? r.failed_gates : [];
      const passed = Array.isArray(r.passed_gates) ? r.passed_gates : [];

      return `
        <div class="card">
          <div class="badge ${badgeClass(r.adaptive_publish_status)}">${statusLabel(r.adaptive_publish_status)}</div>
          <div class="teams">${r.home_team_name} vs ${r.away_team_name}</div>
          <div class="pick">${r.pick} <span style="color:#9fb3c8">(${r.market})</span></div>

          <div class="row"><span>Elite Score</span><span>${money(r.adjusted_elite_score || r.elite_score)}</span></div>
          <div class="row"><span>Confidence</span><span>${pct(r.adjusted_confidence || r.confidence)}</span></div>
          <div class="row"><span>Safety Score</span><span>${money(r.safety_score)}</span></div>
          <div class="row"><span>Odds</span><span>${r.odds_decimal || "-"}</span></div>
          <div class="row"><span>Bookmaker</span><span>${r.bookmaker || "-"}</span></div>
          <div class="row"><span>CLV</span><span>${pct(r.clv_percent)}</span></div>
          <div class="row"><span>Grade</span><span>${r.grade || "PENDING"}</span></div>
          <div class="row"><span>Units</span><span>${r.units_result === null || r.units_result === undefined ? "-" : r.units_result}</span></div>

          <div class="notes">
            ${failed.length ? `<b>Failed Gates</b>${failed.map(g => `<div class="gate">❌ ${g.gate}: ${g.note}</div>`).join("")}` : `<b>Passed</b><div class="gate">✅ No failed gates</div>`}
            ${passed.length ? `<br><b>Passed Gates</b>${passed.slice(0,5).map(g => `<div class="gate">✅ ${g.gate}</div>`).join("")}` : ""}
          </div>
        </div>
      `;
    }

    function renderSection(title, rows) {
      if (!rows.length) {
        return `
          <div class="section">
            <h2>${title}</h2>
            <div class="empty">No picks in this section.</div>
          </div>
        `;
      }

      return `
        <div class="section">
          <h2>${title}</h2>
          <div class="cards">
            ${rows.map(renderCard).join("")}
          </div>
        </div>
      `;
    }

    async function loadPicks() {
      const content = document.getElementById("content");
      content.innerHTML = `<div class="empty">Loading today’s picks...</div>`;

      const { data, error } = await client
        .from("soccer_master_today_view")
        .select("*")
        .order("adjusted_elite_score", { ascending: false });

      if (error) {
        content.innerHTML = `<div class="empty">Error loading picks: ${error.message}</div>`;
        return;
      }

      const rows = data || [];

      const elite = rows.filter(r => r.adaptive_publish_status === "PUBLISH_ELITE");
      const safe = rows.filter(r => r.adaptive_publish_status === "PUBLISH_SAFE");
      const watch = rows.filter(r => r.adaptive_publish_status === "WATCHLIST");
      const reject = rows.filter(r => !["PUBLISH_ELITE", "PUBLISH_SAFE", "WATCHLIST"].includes(r.adaptive_publish_status));

      document.getElementById("eliteCount").textContent = elite.length;
      document.getElementById("safeCount").textContent = safe.length;
      document.getElementById("watchCount").textContent = watch.length;
      document.getElementById("rejectCount").textContent = reject.length;

      content.innerHTML =
        renderSection(sectionTitle("PUBLISH_ELITE"), elite) +
        renderSection(sectionTitle("PUBLISH_SAFE"), safe) +
        renderSection(sectionTitle("WATCHLIST"), watch) +
        renderSection(sectionTitle("REJECT"), reject);
    }

    loadPicks();
    setInterval(loadPicks, 60000);
  </script>
</body>
</html>
