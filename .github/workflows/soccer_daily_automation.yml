name: SharpEdge Soccer Daily Automation

on:
  schedule:
    # 2:00 AM Toronto during daylight time = 6:00 AM UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  run-soccer-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requirements
        run: |
          pip install -r requirements.txt

      - name: Run sharp engine (canonical daily build)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SPORTSDATA_KEY: ${{ secrets.SPORTSDATA_KEY }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          python -m scripts.run_sharp_engine

      - name: Grade results and update track record
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SPORTSDATA_KEY: ${{ secrets.SPORTSDATA_KEY }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          python -m src.models.grade_soccer_results
