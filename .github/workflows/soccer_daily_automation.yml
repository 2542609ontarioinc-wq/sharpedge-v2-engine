name: SharpEdge Soccer Daily Automation

on:
  schedule:
    # 2:00 AM Toronto during daylight time = 6:00 AM UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  run-soccer-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requirements
        run: |
          pip install -r requirements.txt

      - name: Run daily soccer engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: |
          python -m scripts.run_full_soccer_engine
          python -m src.ingestion.sync_soccer_live_lineups
          python -m src.models.build_soccer_safety_engine_v3
          python -m src.models.build_soccer_elite_score
          python -m src.models.build_soccer_promotion_events
          python -m scripts.check_soccer_promotion_events
          