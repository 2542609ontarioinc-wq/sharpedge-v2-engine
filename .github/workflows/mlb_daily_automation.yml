name: SharpEdge MLB Daily Automation

on:
  # External hourly trigger (more reliable than GitHub's scheduler).
  # Set up cron-job.org (free) to POST every hour during game time:
  #   URL: https://api.github.com/repos/OWNER/REPO/dispatches
  #   Method: POST  Auth: Bearer <PAT with actions:write>
  #   Body: {"event_type": "hourly-mlb-refresh"}
  repository_dispatch:
    types: [hourly-mlb-refresh]
  schedule:
    # 8:00 AM UTC = ~4:00 AM Toronto (EDT) — morning full-engine run
    - cron: "0 8 * * *"
    # Hourly 14:00–23:00 UTC = 10 AM–7 PM ET — batter props for afternoon/evening games
    - cron: "0 14-23 * * *"
    # Hourly 00:00–03:00 UTC = 8 PM–11 PM ET — batter props for late-night games
    - cron: "0 0-3 * * *"
  workflow_dispatch:

jobs:
  run-mlb-engine:
    runs-on: ubuntu-latest
    # Only the morning cron (or manual dispatch) runs the full engine.
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 8 * * *'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requirements
        run: |
          pip install -r requirements.txt

      - name: Run MLB engine (ingest → pitchers → team strength → model → picks → backtest)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SPORTSDATA_KEY: ${{ secrets.SPORTSDATA_KEY }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          python -m scripts.run_mlb_engine

      - name: Grade MLB picks and update track record
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SPORTSDATA_KEY: ${{ secrets.SPORTSDATA_KEY }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          python -m src.models.grade_mlb_results

      - name: Compute CLV per graded pick and update track record
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python -m src.models.build_mlb_clv

  refresh-batter-props:
    runs-on: ubuntu-latest
    # Hourly runs: sync confirmed lineups then generate batter props for games
    # starting in the next 2 hours.  Pitcher props (from the morning run) are
    # not touched.  Runs 14:00–03:00 UTC to cover the full ET game slate.
    # repository_dispatch (from cron-job.org) is the primary trigger; GitHub
    # schedule crons are kept as fallback in case dispatch is missed.
    if: >
      github.event_name == 'repository_dispatch' ||
      github.event.schedule == '0 14-23 * * *' ||
      github.event.schedule == '0 0-3 * * *'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install requirements
        run: |
          pip install -r requirements.txt

      - name: Snapshot closing odds for CLV tracking (bulk call only, 1 API credit)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python -m src.ingestion.snap_mlb_odds_closing

      - name: Sync confirmed batting lineups (2-hour window)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python -m src.ingestion.sync_mlb_lineups

      - name: Recompute v4 lineup predictions + picks for window games (0 Odds API credits)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python -m src.models.refresh_mlb_v4_lineup

      - name: Generate batter props for window games
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python -m src.models.generate_mlb_player_props --batter-only
